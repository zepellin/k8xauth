name: Release

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - uses: wangyoucao577/go-release-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}
          binary_name: "k8xauth"
          ldflags: >-
            -s -w
            -X k8xauth/cmd.version=${{ env.RELEASE_VERSION }}
          build_flags: "-trimpath"
          compress_assets: "OFF"

  release-image:
    name: Release Container Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/linux/amd64
          go build -trimpath -ldflags "-s -w -X k8xauth/cmd.version=${{ env.RELEASE_VERSION }}" -o dist/linux/amd64/k8xauth .

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/linux/arm64
          go build -trimpath -ldflags "-s -w -X k8xauth/cmd.version=${{ env.RELEASE_VERSION }}" -o dist/linux/arm64/k8xauth .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ github.repository }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/${{ github.repository }}@${DIGEST}"
